# Cloud Build — automated deploy to Cloud Run
# Trigger: push to main branch
# Usage: gcloud builds submit --config cloudbuild.yaml

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$gdg-hackathon-489602/storyforge:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$gdg-hackathon-489602/storyforge:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$gdg-hackathon-489602/storyforge'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'storyforge'
      - '--image=gcr.io/$gdg-hackathon-489602/storyforge:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--timeout=300'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$gdg-hackathon-489602'
      - '--set-env-vars=USE_IMAGEN=false'
      - '--set-env-vars=USE_NEURAL2_TTS=true'
      - '--set-env-vars=USE_GEMINI_IMAGES=true'

images:
  - 'gcr.io/$gdg-hackathon-489602/storyforge:$COMMIT_SHA'
  - 'gcr.io/$gdg-hackathon-489602/storyforge:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
